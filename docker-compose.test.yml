services:
  minio:
    # Use the official MinIO image (latest stable). This avoids a non-existent pinned quay tag.
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    # ports:
    #   - "9000:9000"
    #   - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 2s
      retries: 20

  app_under_test:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_KEY: minioadmin
      S3_SECRET: minioadmin
    depends_on:
      - minio
    # ports:
    #   - "8000:8000"

  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_KEY: minioadmin
      S3_SECRET: minioadmin
    depends_on:
      minio:
        condition: service_healthy
      app_under_test:
        condition: service_started
    volumes:
      # Mount tests as read-write so pytest can create its .pytest_cache inside the bind mount
      - ./src/tests:/tests:rw

volumes: {}
